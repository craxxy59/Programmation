<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DispoCal</title>
    <meta name="description" content="Calendrier partagé de disponibilités." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero hero-minimal">
        <h1>DispoCal</h1>
      </header>

      <main class="layout">
        <section id="welcome-section" class="card card-narrow stack">
          <form id="welcome-form" class="stack">
            <label>
              <span>Nom</span>
              <input
                id="welcome-name"
                name="name"
                maxlength="60"
                required
                placeholder="Camille"
                autocomplete="name"
              />
            </label>

            <button type="submit" class="primary-button">Continuer</button>
          </form>
        </section>

        <section id="calendar-section" class="card stack hidden">
          <div class="section-title-row">
            <div class="range-nav">
              <button id="prev-range" type="button" class="ghost-button nav-button" aria-label="Période précédente">←</button>
              <h2 id="board-title">Chargement…</h2>
              <button id="next-range" type="button" class="ghost-button nav-button" aria-label="Période suivante">→</button>
            </div>
            <div class="toolbar toolbar-end">
              <span id="current-name-badge" class="badge"></span>
              <button id="change-name" type="button" class="ghost-button">Nom</button>
            </div>
          </div>

          <div class="event-meta" id="board-meta"></div>

          <div class="split">
            <section class="subcard stack">
              <div class="section-title-row">
                <h3>Mes dispos</h3>
                <div class="toolbar">
                  <button id="select-all" type="button" class="ghost-button">Tout</button>
                  <button id="clear-all" type="button" class="ghost-button">Rien</button>
                </div>
              </div>

              <form id="availability-form" class="stack">
                <div id="editor-summary" class="muted small"></div>
                <div id="editor-grid" class="calendar-grid-wrapper"></div>
                <button type="submit" class="primary-button">Enregistrer</button>
              </form>
            </section>

            <section class="subcard stack">
              <h3>Vue</h3>
              <div id="aggregate-summary" class="muted small"></div>
              <div id="aggregate-grid" class="calendar-grid-wrapper"></div>
              <div>
                <h4>Participants</h4>
                <div id="participants-list" class="stack compact-list empty-state">Aucun</div>
              </div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast hidden" aria-live="polite"></div>

    <script src="app.js" defer></script>
  </body>
</html>
